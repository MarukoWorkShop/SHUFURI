<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./assets/SHUFURI_256.png" />
    <link rel="apple-touch-icon" href="./assets/SHUFURI_256.png" />
    <link rel="preload" href="./assets/KozMinPro-ExtraLight.otf" as="font" type="font/otf" crossorigin />
    <link rel="preload" href="./assets/KozMinPro-Light.otf" as="font" type="font/otf" crossorigin />
    <link rel="preload" href="./assets/HCRBatang.ttf" as="font" type="font/truetype" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SHUFURI</title>
    <style>
      #app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f7f7;
        transition: opacity 0.28s ease, visibility 0.28s ease;
      }
      #app-boot.app-boot--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .app-boot__spinner {
        width: 28px;
        height: 28px;
        border: 2px solid #e0e0e0;
        border-top-color: #000000;
        border-radius: 50%;
        animation: app-boot-spin 0.8s linear infinite;
      }
      @keyframes app-boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app-boot" aria-live="polite" aria-busy="true" aria-label="加载中">
      <div class="app-boot__spinner" role="progressbar" aria-hidden="true"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
